    <style>
        /* CSS VARIABLES & CORE STYLES */
        :root {
            --linen: #faf0e6;
            --antique-white: #faebd7;
            --champagne: #f7e7ce;
            --cosmic-latte: #fff8e7;
            --bisque: #ffe4c4;
            --cream: #fffdd0;
            --ecru: #cdb891;
            --khaki: #c3b091;
            --brown-dark: #4e342e;
            --bg-primary: var(--linen);
            --bg-secondary: var(--cosmic-latte);
            --text-primary: #2c2c2c;
            --text-secondary: #555555;
            --nav-bg: #3e2723;
            --card-bg: #ffffff;
            --transition: 0.5s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --text-primary: #f5f5f5;
            --text-secondary: #cccccc;
            --nav-bg: #1b1b1b;
            --card-bg: #2a2a2a;
            --linen: #1a1a1a;
            --cosmic-latte: #242424;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; color: var(--khaki); }
        a { text-decoration: none; color: inherit; transition: var(--transition); }

        /* Header */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            padding: 0.8rem 5%; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { font-size: 1.8rem; font-weight: 700; color: #fff; font-family: 'Playfair Display', serif; letter-spacing: 1px; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav ul li a { color: #f5f5f5; font-weight: 500; font-size: 0.95rem; letter-spacing: 1px; }
        nav ul li a:hover { color: var(--ecru); }

        .header-btns { display: flex; align-items: center; gap: 15px; }
        .btn-book { background: var(--ecru); color: #3e2723; padding: 10px 22px; border-radius: 30px; font-weight: 700; transition: var(--transition); cursor: pointer; }
        .btn-book:hover { background: #fff; transform: translateY(-2px); }

        .theme-toggle { cursor: pointer; font-size: 1.3rem; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Marquee */
        .marquee { margin-top: 65px; background: var(--bisque); color: #3e2723; padding: 12px 0; overflow: hidden; white-space: nowrap; font-size: 0.9rem; font-weight: 600; border-bottom: 2px solid var(--ecru); }
        .marquee-content { display: flex; width: max-content; animation: marquee-weather 30s linear infinite; }
        .marquee-content span { padding-right: 100px; }
        @keyframes marquee-weather { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Hero */
        .hero {
            width: 100%; height: 700px; margin: 0 auto;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("https://haycafe.vn/wp-content/uploads/2022/03/anh-Ho-Hoan-Kiem-ben-nhanh-phuong-do-1.jpg") center/cover no-repeat;
            display: flex; justify-content: center; align-items: center; text-align: center; color: white; border-radius: 0 0 40px 40px;
        }
        .hero-sub { font-size: 12rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; color: rgba(255,255,255,0.98); text-shadow: 0 10px 26px rgba(0,0,0,0.55); }
        .hero-main { font-size: 2.2rem; color: rgba(255,255,255,0.92); text-shadow: 0 8px 22px rgba(0,0,0,0.55); letter-spacing: 8px; font-weight: 400; }

        /* Sections */
        section { padding: 80px 10%; }
        .intro-content { max-width: 950px; margin: 0 auto; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); margin-top: 70px; gap: 30px; }
        .stat-item { background: var(--card-bg); padding: 45px 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); }
        .stat-item:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); border-color: var(--ecru); }

        /* Destinations */
        .flip-card { background-color: transparent; width: 100%; height: 450px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 30px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .flip-card-front img { width: 100%; height: 100%; object-fit: cover; }
        .flip-card-front .overlay { position: absolute; bottom: 0; width: 100%; padding: 35px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: white; font-size: 1.6rem; font-weight: 700; text-align: left; }
        .flip-card-back { background-color: var(--nav-bg); color: white; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 45px; }

        /* News */
        .news-slider { display: flex; gap: 40px; overflow-x: auto; padding: 25px 10px; scrollbar-width: thin; scroll-snap-type: x mandatory; }
        .news-card { min-width: 400px; background: var(--card-bg); border-radius: 25px; overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.07); transition: var(--transition); scroll-snap-align: start; }
        .news-card img { width: 100%; height: 260px; object-fit: cover; }
        .news-body { padding: 35px; }

        /* Testimonials */
        .testimonial-card { background: var(--card-bg); border: 1px solid var(--ecru); padding: 30px; border-radius: 25px; width: 450px; flex-shrink: 0; display: flex; gap: 20px; white-space: normal; }
        @keyframes marquee-testimonials { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee-testimonials { animation: marquee-testimonials 40s linear infinite; }

        /* Contact */
        .contact-section { background: var(--bg-secondary); padding: 60px 10%; display: grid; grid-template-columns: 1.5fr 1fr; gap: 60px; }
        .contact-form-container { background: #fff; padding: 50px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px 20px; border: 1px solid #eee; border-radius: 15px; background: #fcfcfc; outline: none; }

        /* Footer */
        footer { background: #151515; color: #ccc; padding: 60px 10% 40px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 50px; }
        .copyright-bar { background: #151515; color: #888; padding: 20px 10%; border-top: 1px solid #222; text-align: center; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 30px; }
        .modal-content { background: var(--bg-primary); max-width: 700px; width: 100%; border-radius: 30px; overflow: hidden; position: relative; }

        /* Floating UI */
        .audio-btn { position: fixed; bottom: 45px; left: 45px; z-index: 1001; background: var(--nav-bg); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid var(--ecru); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .chatbot { position: fixed; bottom: 45px; right: 45px; z-index: 1001; }
        .chat-btn { background: var(--nav-bg); color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid var(--ecru); font-size: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .chat-window { position: absolute; bottom: 90px; right: 0; width: 400px; background: var(--card-bg); border-radius: 30px; display: none; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .chat-header { background: var(--nav-bg); color: white; padding: 18px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { height: 220px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: var(--bg-secondary); }
        .chat-msg { padding: 14px 20px; border-radius: 20px; max-width: 88%; }
        .msg-bot { background: #fff; color: #333; align-self: flex-start; }
        .msg-user { background: var(--nav-bg); color: white; align-self: flex-end; }

        .info-frame { border: 1px solid var(--ecru); padding: 35px; border-radius: 25px; background: var(--card-bg); transition: var(--transition); box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .fade-in { opacity: 0; transform: translateY(50px); transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 1200px) { .hero-sub { font-size: 4.5rem; } }
        @media (max-width: 768px) {
            .hero-sub { font-size: 2.5rem; }
            .hero-main { font-size: 1.8rem; letter-spacing: 4px; }
            .contact-section { grid-template-columns: 1fr; }
            footer { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            header nav { display: none; }
            .chat-window { width: 300px; }
        }
    </style>
</head>

          const [hasStarted, setHasStarted] = useState(false);
          const elementRef = useRef(null);

          useEffect(() => {
            const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setHasStarted(true); }, { threshold: 0.5 });
            if (elementRef.current) observer.observe(elementRef.current);
            return () => observer.disconnect();
          }, []);

          useEffect(() => {
            if (!hasStarted) return;
            let startTime = null;
            const step = (timestamp) => {
              if (!startTime) startTime = timestamp;
              const progress = Math.min((timestamp - startTime) / duration, 1);
              setCount(progress * target);
              if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
          }, [hasStarted, target, duration]);

          return <h3 ref={elementRef} style={{ color: "#c3b091", fontSize: "3.2rem", marginBottom: "12px" }}>{count.toFixed(decimals).replace('.', ',')}{suffix}</h3>;

                <div>
                  <h4 style={{ color: "#fff", marginBottom: "30px", fontSize: "1.5rem" }}>Du lịch Hà Nội</h4>
                  <p>Khám phá vẻ đẹp ngàn năm văn hiến của Thủ đô yêu dấu.</p>
                </div>
                <div>
                  <h4 style={{ color: "#fff", marginBottom: "30px", fontSize: "1.5rem" }}>Chính sách</h4>
                  <ul><li><a href="#">Điều khoản sử dụng</a></li><li><a href="#">Chính sách bảo mật</a></li></ul>
                </div>
                <div>
                  <h4 style={{ color: "#fff", marginBottom: "30px", fontSize: "1.5rem" }}>Liên hệ</h4>
                  <p>📍 36 Phố Cổ, Hoàn Kiếm, Hà Nội</p>
                  <p>📞 1900 1234</p>
                </div>
              </footer>

              <div className="copyright-bar"><p>@2026 Du lịch Hà Nội. Tất cả các quyền đã được đăng ký.</p></div>

              {selectedDest && (
                <div className="modal" style={{ display: "flex" }}>
                  <div className="modal-content">
                    <span className="close-modal" onClick={() => setSelectedDest(null)} style={{ position: "absolute", top: "15px", right: "25px", fontSize: "3rem", cursor: "pointer", zIndex: 10 }}>&times;</span>
                    <div className="modal-body" style={{ padding: "40px", paddingTop: "80px" }}>
                      <h2 style={{ fontSize: "2.2rem", color: "var(--khaki)", marginBottom: "20px" }}>{selectedDest.name}</h2>
                      <img src={selectedDest.img} style={{ width: "100%", height: "350px", objectFit: "cover", borderRadius: "20px", marginBottom: "25px" }} referrerPolicy="no-referrer" />
                      <p style={{ lineHeight: 1.8, color: "var(--text-secondary)" }}>{selectedDest.desc}</p>
                    </div>
                  </div>
                </div>
              )}

              <div className="audio-btn" onClick={toggleAudio}>{isPlaying ? "⏸️" : "🎵"}</div>
              <audio ref={audioRef} loop><source src="https://cdn.pixabay.com/audio/2024/05/28/audio_eab9a7a9f2.mp3" type="audio/mpeg" /></audio>

              <div className="chatbot">
                <div className="chat-btn" onClick={() => setIsChatOpen(!isChatOpen)}><MessageCircle size={32} /></div>
                {isChatOpen && (
                  <div className="chat-window" style={{ display: "flex" }}>
                    <div className="chat-header"><span>Hanoi Guide AI</span><span style={{ cursor: "pointer", fontSize: "1.5rem" }} onClick={() => setIsChatOpen(false)}>&times;</span></div>
                    <div className="chat-body" ref={chatBodyRef}>
                      {chatMsgs.map((m, i) => <div key={i} className={`chat-msg msg-${m.type}`}>{m.text}</div>)}
                    </div>
                    <div className="chat-footer">
                      <input type="text" placeholder="Nhập tin nhắn..." value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => { if (e.key === "Enter" && chatInput.trim()) { askBot(chatInput); setChatInput(""); } }} />
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
