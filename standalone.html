            --nav-bg: #3e2723;
            --card-bg: #ffffff;
            --transition: 0.5s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --text-primary: #f5f5f5;
            --text-secondary: #cccccc;
            --nav-bg: #1b1b1b;
            --card-bg: #2a2a2a;
            --linen: #1a1a1a;
            --cosmic-latte: #242424;

        body {

            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            color: var(--khaki);
        }

        header {

            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo { 
            font-size: 1.8rem; 
            font-weight: 700; 
            color: #fff; 
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        nav ul { display: flex; list-style: none; gap: 25px; }
        nav ul li a { color: #f5f5f5; font-weight: 500; font-size: 0.95rem; text-transform: none; letter-spacing: 1px; }
        nav ul li a:hover { color: var(--ecru); }

            font-weight: 700; 
            border: none; 
            cursor: pointer;

            border: none; 
            color: #fff; 
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

            background: var(--bisque);
            color: #3e2723;
            padding: 12px 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 2px solid var(--ecru);
            text-align: center;
        }
        .marquee-content {
            display: flex;
            width: max-content;
            animation: marquee-weather 30s linear infinite;
        }
        .marquee-content span {
            padding-right: 100px;
        }
        @keyframes marquee-weather {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }

            height: 700px;
            margin: 0 auto;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("https://haycafe.vn/wp-content/uploads/2022/03/anh-Ho-Hoan-Kiem-ben-nhanh-phuong-do-1.jpg") center/cover no-repeat;

            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            border-radius: 0 0 40px 40px;
            overflow: hidden;

        .hero-sub {

            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.98);
            text-shadow: 0 10px 26px rgba(0,0,0,0.55);

            color: rgba(255,255,255,0.92);
            text-shadow: 0 8px 22px rgba(0,0,0,0.55);

            padding: 30px;
            border-radius: 25px;
            transition: var(--transition);

            display: flex;
            gap: 20px;
            width: 450px;
            flex-shrink: 0;
            white-space: normal;

        .contact-section {
            background: var(--bg-secondary);
            padding: 60px 10%;

            grid-template-columns: 1.5fr 1fr;
            gap: 60px;
